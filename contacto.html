<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Librería Aurora | Contacto</title>
  <link rel="stylesheet" href="assets/css/contacto.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-content">
      <a class="brand" href="index.html" aria-label="Ir al inicio">
        <img src="assets/img/banners/Logo librería.jpg" alt="Logo Librería Aurora" class="brand__logo">
        <span class="brand__name">Librería Aurora</span>
      </a>

      <nav class="nav" aria-label="Navegación principal">
        <ul class="nav__list">
          <li class="nav__item"><a class="nav__link" href="index.html">Inicio</a></li>
          <li class="nav__item"><a class="nav__link" href="categorias.html">Categorías</a></li>
          <li class="nav__item"><a class="nav__link" href="productos.html">Productos</a></li>
          <li class="nav__item"><a class="nav__link is-active" href="contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <header class="section__header">
          <h1 class="section__title">Contáctanos</h1>
          <p class="section__subtitle">Envíanos tu mensaje. Te responderemos pronto.</p>
        </header>

        <section class="form-card" aria-label="Formulario de contacto">
          <form id="contactForm" novalidate>
            <div class="form-grid">
              <div class="form-field">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Usuario" />
                <small class="error" id="errorNombre"></small>
              </div>

              <div class="form-field">
                <label for="ciudad">Ciudad</label>
                <input type="text" id="ciudad" name="ciudad" placeholder="Ej: Ciudad" />
                <small class="error" id="errorCiudad"></small>
              </div>

              <div class="form-field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" />
                <small class="error" id="errorEmail"></small>
              </div>

              <div class="form-field">
                <label for="asunto">Asunto</label>
                <input type="text" id="asunto" name="asunto" placeholder="Ej: Consulta de libro" />
                <small class="error" id="errorAsunto"></small>
              </div>

              <div class="form-field form-field--full">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" name="descripcion" rows="5" placeholder="Escribe tu mensaje..."></textarea>
                <small class="error" id="errorDescripcion"></small>
              </div>
            </div>

            <div class="form-actions">
              <button class="btn btn--primary" type="submit">Enviar</button>
              <button class="btn btn--outline" type="reset">Limpiar</button>
            </div>

            <p class="form-success" id="successMsg" role="status" aria-live="polite"></p>
          </form>
        </section>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <p>© <span id="year"></span> Librería Aurora.</p>
      <p class="footer-links">
        <a href="index.html">Inicio</a> · <a href="categorias.html">Categorías</a> · <a href="productos.html">Productos</a>
      </p>
    </div>
  </footer>

  <script src="assets/js/script.js"></script>
</body>
</html>
